name: CI

# Runs in the standalone barry-io-lakeflow-connector repo (this workflow lives
# inside the folder so it activates once the folder is its own repo).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Syntax check
        run: python -m py_compile barry_io_lakeflow.py

      - name: Run tests
        run: pytest -q

      - name: Build deployment artifact
        run: |
          python tools/build_artifact.py
          python -m py_compile dist/barry-io-lakeflow/barry_io_lakeflow.py
